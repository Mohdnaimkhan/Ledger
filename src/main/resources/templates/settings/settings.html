<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-4">

        <!-- Success Message -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">

            <span th:text="${success}"></span>

            <button type="button" class="btn-close" data-bs-dismiss="alert">
            </button>

        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">

            <span th:text="${error}"></span>

            <button type="button" class="btn-close" data-bs-dismiss="alert">
            </button>

        </div>

        <h2 class="mb-4">
            ⚙️ Settings
        </h2>

        <!-- Business Details -->

        <div class="card shadow-sm mb-4">

            <div class="card-header">
                🏢 Business Details
            </div>

            <div class="card-body">

                <form th:action="@{/settings/save}" th:object="${settings}" method="post">

                    <div class="mb-3">

                        <label class="form-label">
                            Business Name
                        </label>

                        <input type="text" class="form-control" th:field="*{businessName}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Owner Name
                        </label>

                        <input type="text" class="form-control" th:field="*{ownerName}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Mobile
                        </label>

                        <input type="text" class="form-control" th:field="*{mobile}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Address
                        </label>

                        <textarea class="form-control" th:field="*{address}">
                </textarea>

                    </div>

                    <button class="btn btn-primary">
                        Save Settings
                    </button>

                </form>

            </div>

        </div>

        <!-- Theme -->

        <div class="card shadow-sm mb-4">

            <div class="card-header">
                🎨 Theme
            </div>

            <div class="card-body">

                <p class="text-muted">
                    Theme settings will be available here.
                </p>

            </div>

        </div>

        <!-- Database -->

        <div class="card shadow-sm mb-4">

            <div class="card-header">
                💾 Database
            </div>

            <div class="card-body">

                <a th:href="@{/settings/backup}" class="btn btn-success me-2">

                    📥 Backup Database

                </a>

                <hr>

                <form th:action="@{/settings/restore}" method="post" enctype="multipart/form-data">

                    <div class="mb-3">

                        <input type="file" name="backupFile" class="form-control" accept=".db" required>

                    </div>

                    <button class="btn btn-warning">

                        📤 Restore Database

                    </button>

                </form>

            </div>

        </div>

        <!-- App Info -->

        <div class="card shadow-sm">

            <div class="card-header">
                ℹ️ App Information
            </div>

            <div class="card-body">

                <p>
                    <strong>Application:</strong>
                    Ledger Book
                </p>

                <p>
                    <strong>Version:</strong>
                    1.0.0
                </p>

                <p>
                    <strong>Developer:</strong>
                    Mohd Naim
                </p>

            </div>

        </div>


    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
