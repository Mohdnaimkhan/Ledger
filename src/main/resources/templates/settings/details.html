<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Customer Details</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div th:replace="~{fragments/navbar}"></div>
    <div class="container py-4">
      <div class="row g-3">

      <!-- Entries -->

      <div class="card shadow-sm mt-4">
        <div class="card-header">Business deatils</div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Business Name</th>
                  <th>Owner Name</th>
                  <th>Mobile No</th>
                  <th>Address</th>
                </tr>
              </thead>

              <tbody>
               <tr th:each="setting : ${settings}">
                <td th:text="${setting.id}"></td>
                <td th:text="${setting.businessName}"></td>
                <td th:text="${setting.ownerName}"></td>
                <td th:text="${setting.mobile}"></td>
                <td th:text="${setting.address}"></td>
               </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
