<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Ledger Book</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <div th:replace="~{fragments/navbar}"></div>
  <div class="container py-4">
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center text-light bg-info">
        <h3 class="mb-0">All Customers</h3>

        <a th:href="@{/customers/new}" class="btn btn-primary">
          Add Customer
        </a>
      </div>
      <!-- // search  -->
      <div class="card-body">
        <form method="get" class="mb-3">
          <input type="text" id="customerSearch" class="form-control" placeholder="Search customer..." />
        </form>

        <div class="table-responsive">
          <div id="notFoundMessage" class="alert alert-danger text-center mt-2" style="display:none;">
            ❌ No Records Found
          </div>
          <table class="table table-hover align-middle table-striped">
            <thead class="table-dark">
              <tr>
                <th>Buseness Name</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Mobile</th>
                <th>Address</th>
                <th>Balance</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="customerTable">

              <tr th:each="customer : ${customers}">
                <td th:text="${customer.shopName}"></td>
                <td th:text="${customer.firstName}"></td>
                <td th:text="${customer.lastName}"></td>

                <td th:text="${customer.mobile}"></td>

                <td th:text="${customer.address}"></td>
                <td th:class="${customer.balance.signum() < 0 ? 'text-danger fw-bold' : 'text-success fw-bold'}"
                  th:text="${customer.balance}">
                </td>

                <td>
                  <div class="btn d-flex justify-content-between" role="group">
                    <a class="btn btn-sm btn-info" th:href="@{/customers/{id}(id=${customer.id})}">
                      <i class="bi bi-eye"></i>
                      View
                    </a>

                    <a class="btn btn-sm btn-warning" th:href="@{/customers/edit/{id}(id=${customer.id})}">
                      <i class="bi bi-pencil"></i>
                      Edit
                    </a>

                    <a class="btn btn-sm btn-danger" th:href="@{/customers/delete/{id}(id=${customer.id})}"
                      onclick="return confirm('Delete customer?');">
                      <i class="bi bi-trash"></i>
                      Delete
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById("customerSearch")
      .addEventListener("keyup", function () {

        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#customerTable tr");

        let visibleRows = 0;

        rows.forEach(function (row) {

          let text = row.innerText.toLowerCase();

          if (text.includes(filter)) {
            row.style.display = "";
            visibleRows++;
          } else {
            row.style.display = "none";
          }
        });

        document.getElementById("notFoundMessage").style.display =
          visibleRows === 0 ? "block" : "none";
      });
  </script>

</body>

</html>
