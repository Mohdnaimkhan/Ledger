<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <title>Ledger Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-body">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container py-2">
    <div class="container py-3 mb-2">
      <div class="bg-body-secondary rounded shadow-sm border border-1 border-info p-4 ">
        <h2 class="mb-2">
          <i class="bi bi-cash-stack text-success m-2 "></i>
          Welcome,
          <span th:text="${settings.ownerName}">Ledger Book</span>
        </h2>

        <p class="text-muted mb-0">
          Manage customers and ledger entries efficiently.
        </p>
      </div>


      <div class="row g-3 mt-2">
        <div class="col-md-3">
          <div class="card shadow-sm">
            <div class="card-body text-center">
              <h6>Total Customers</h6>

              <h3 th:text="${totalCustomers}"></h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
              <h6>Total Given</h6>

              <h3 class="text-danger" th:text="'₹ ' + ${totalGiven}"></h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm border-success">
            <div class="card-body text-center">
              <h6>Total Received</h6>

              <h3 class="text-success" th:text="'₹ ' + ${totalReceived}"></h3>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm border-primary">
            <div class="card-body text-center">
              <h6>Net Balance</h6>

              <h3 class="text-primary" th:text="'₹ ' + ${netBalance}"></h3>
            </div>
          </div>
        </div>
        <div>
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Total Entries</h5>
              <h2 class="text-success" th:text="${totalEntries}">0</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <a class="btn btn-primary" th:href="@{/customers}"> View Customers </a>
    </div>

    <div class="card shadow-sm mt-4">
      <div class="card-header">Recent Transactions</div>

      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-dark">
              <tr>
                <th>Date</th>
                <th>Customer</th>
                <th>Type</th>
                <th>Amount</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="entry : ${recentEntries}">
                <td th:text="${entry.entryDate}"></td>

                <td th:text="${entry.customer.firstName}"></td>

                <td>
                  <span th:if="${entry.type.name() == 'GIVEN'}" class="badge bg-danger">
                    GIVEN
                  </span>

                  <span th:if="${entry.type.name() == 'RECEIVED'}" class="badge bg-success">
                    RECEIVED
                  </span>
                </td>

                <td th:text="${entry.amount}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
